version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - misspell
    - unconvert
    - gocritic
  exclusions:
    rules:
      # HTTP handler signatures (func(w, r)) in tests frequently leave one
      # param unused; the signature is fixed, so this is noise, not a smell.
      - path: _test\.go
        linters:
          - revive
        text: unused-parameter

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
